name: Build tvm3u8 EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        # 确保完整安装所有依赖，然后再执行打包
        run: |
          npm install
          npm install -g pkg

      - name: Build EXE
        # 直接运行 package.json 里定义好的标准打包脚本
        run: npm run pkg

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: tvm3u8-windows
          path: tvm3u8.exe
