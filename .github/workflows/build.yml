name: Build tvm3u8 EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18 # 推荐升级到 Node 18，兼容性和网络请求表现更稳定

      - name: Install dependencies
        run: |
          npm install
          npm install -g pkg  # 全局安装打包工具

      - name: Build EXE
        # 这里移除 --targets 参数中的具体版本，让 pkg 根据 package.json 自动识别并抓取 assets
        run: pkg server.js --target node18-win-x64 --output tvm3u8.exe

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: tvm3u8-windows
          path: tvm3u8.exe
