name: Build tvm3u8 EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16

      - name: Install dependencies
        run: npm install

      - name: Install pkg
        run: npm install -g pkg

      - name: Build EXE
        run: pkg server.js --targets node16-win-x64 --output tvm3u8.exe

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: tvm3u8-windows
          path: tvm3u8.exe
